<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Wan! 🎁</title>
    <meta name="language" content="en">
    <meta name="description" content="A special birthday gift is waiting for you!">

    <!-- Favicon and Icons -->
    <link rel="icon" href="Public/image/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="Public/image/logo.png">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Happy Birthday Wan! 🎁">
    <meta property="og:description"
        content="A special birthday gift is waiting for you!">
    <meta property="og:image" content="Public/image/bukudepan.jpg">
    <!-- <meta property="og:url" content="https://happybirthdaydeargift.vercel.app/?websiteId=686d4ef53c910ba1bee5ec5c"> -->
    <meta property="og:type" content="website">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Happy Birthday Wan! 🎁">
    <meta name="twitter:description"
        content="A special birthday gift is waiting for you!">
    <meta name="twitter:image" content="Public/image/bukudepan.jpg">

    <link rel="icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/sun0225SUN/photos/img/20210715233345.png">
    <link rel="stylesheet" href="css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>

<body>
    <canvas id="matrix-rain" style="display: none;"></canvas>
    <canvas style="position:absolute;width:100%;height:100%;z-index:9999;display:none;" class="canvas"></canvas>
    <div class="overlay">
        <div class="stars-container" id="starsContainer"></div>
        <img id="gift-image" src="Public/image/happy3.gif"
            style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; max-width: 80%; max-height: 80%;" />
        <div class="content-display" id="contentDisplay">
            <p id="contentText"></p>
        </div>
        <div class="firework-container" id="fireworkContainer"></div>
        <div class="book-container">
            <div class="book" id="book"></div>
        </div>

        <button class="music-control" id="musicControl" title="Play/Pause Music">
            ▶
        </button>



        <audio id="birthdayAudio" loop>
            <source src="Public/music/music2.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <div id="orientation-lock">
            <div class="phone-icon">
                <img src="Public/image/screen.png" alt="">
            </div>
        </div>

        <!-- Nút Full màn hình, chỉ hiện trên Android -->
        <button id="fullscreenBtn" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 990010;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    background: #222;
    color: #fff;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    cursor: pointer;
    display: none;
">
            <img style="
    width: 20px;
    height: 20px;
    vertical-align: middle;
" src="Public/image/full.png" alt="">
        </button>
        <script src="jscp/settings.js"></script>
        <script src="jscp/ui.js"></script>
</body>

</html>
